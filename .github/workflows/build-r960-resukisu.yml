name: Build SM-R960 ReSukiSU AP

on:
  workflow_dispatch:
    inputs:
      resukisu_setup_url:
        description: "ReSukiSU setup.sh URL"
        required: true
        default: "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh"
      source_release_tag:
        description: "Release tag containing Kernel.tar.gz and R960XXU1CYK2_Kernel.tar.gz"
        required: true
        default: "source-tarballs"
      firmware_release_tag:
        description: "Release tag containing boot.img.lz4, init_boot.img.lz4, vbmeta.img.lz4"
        required: true
        default: "firmware-r960-czb6"

permissions:
  contents: write

jobs:
  build:
    name: Build SM-R960 ReSukiSU AP
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Samsung source tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p source

          gh release download "${{ github.event.inputs.source_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir source \
            --pattern "*.tar.gz"

          echo "===== SOURCE FILES ====="
          ls -lh source

          test -f source/Kernel.tar.gz
          test -f source/R960XXU1CYK2_Kernel.tar.gz

      - name: Download stock R960XXU2CZB6 firmware images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p firmware

          gh release download "${{ github.event.inputs.firmware_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir firmware \
            --pattern "boot.img*" \
            --pattern "init_boot.img*" \
            --pattern "vbmeta.img*"

          echo "===== FIRMWARE FILES ====="
          ls -lh firmware

      - name: Install dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            python3 python-is-python3 perl git unzip zip tar lz4 xz-utils zstd \
            clang-14 lld-14 llvm-14 rsync cpio kmod dwarves patch file curl \
            openssl \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Set clang 14 path
        run: |
          set -e
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-14/bin/clang --version
          /usr/lib/llvm-14/bin/ld.lld --version

      - name: Extract Samsung kernel source
        run: |
          set -e

          mkdir -p work/kernel

          tar -xzf source/Kernel.tar.gz -C work/kernel
          tar -xzf source/R960XXU1CYK2_Kernel.tar.gz -C work/kernel --strip-components=1

          echo "===== CHECK DEFCONFIG ====="
          find work/kernel/arch/arm64/configs -type f |
          grep -i "wise6blue"

      - name: Add ReSukiSU
        run: |
          set -e

          cd work/kernel

          echo "===== ADDING ReSukiSU ====="
          curl -LSs "${{ github.event.inputs.resukisu_setup_url }}" | bash -

          echo "===== APPLYING MANUAL HOOKS VIA PYTHON INJECTOR ====="
          python3 - <<'PY'
          from pathlib import Path

          def inject_after(file_path, target_str, injection_code):
              p = Path(file_path)
              if not p.exists():
                  print(f"Error: {file_path} does not exist.")
                  return False
              
              content = p.read_text(encoding='utf-8', errors='ignore')
              if injection_code.strip() in content:
                  print(f"Hooks already present in {file_path}. Skipping.")
                  return True
                  
              if target_str not in content:
                  print(f"Error: Target pattern not found in {file_path}")
                  return False
              
              p.chmod(0o644)
              new_content = content.replace(target_str, target_str + "\n" + injection_code)
              p.write_text(new_content, encoding='utf-8')
              print(f"Successfully injected hooks into {file_path}")
              return True

          # 1. fs/stat.c Hook Injections
          stat_decls = "#ifdef CONFIG_KSU_MANUAL_HOOK\n__attribute__((hot))\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\nextern void ksu_handle_newfstat_ret(unsigned int *fd, struct stat __user **statbuf_ptr);\n#if defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_COMPAT_STAT64)\nextern void ksu_handle_fstat64_ret(unsigned long *fd, struct stat64 __user **statbuf_ptr);\n#endif\n#endif"
          inject_after("fs/stat.c", "return cp_new_stat(&stat, statbuf);", stat_decls)

          inject_after("fs/stat.c", "struct kstat stat;\n\tint error;", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif")

          inject_after("fs/stat.c", "SYSCALL_DEFINE2(newfstat, unsigned int, fd, struct stat __user *, statbuf)\n{\n\tstruct kstat stat;", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_newfstat_ret(&fd, &statbuf);\n#endif")

          inject_after("fs/stat.c", "SYSCALL_DEFINE2(fstat64, unsigned long, fd, struct stat64 __user *, statbuf)\n{\n\tstruct kstat stat;", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_fstat64_ret(&fd, &statbuf);\n#endif")

          inject_after("fs/stat.c", "struct kstat stat;\n\tint error;\n\n\terror = vfs_fstatat(dfd, filename, &stat, flag);", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif")

          # 2. fs/exec.c Hook Injections
          exec_decls = "#ifdef CONFIG_KSU_MANUAL_HOOK\n__attribute__((hot))\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif"
          inject_after("fs/exec.c", "return retval;\n}", exec_decls)

          inject_after("fs/exec.c", "\tstruct user_arg_ptr argv = { .ptr.native = __argv };\n\tstruct user_arg_ptr envp = { .ptr.native = __envp };", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n#endif")

          inject_after("fs/exec.c", "\t\t.is_compat = true,\n\t\t.ptr.compat = __envp,\n\t};", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n#endif")

          # 3. fs/open.c Hook Injections
          open_decls = "#ifdef CONFIG_KSU_MANUAL_HOOK\n__attribute__((hot))\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif"
          inject_after("fs/open.c", "return res;\n}", open_decls)

          inject_after("fs/open.c", "SYSCALL_DEFINE3(faccessat, int, dfd, const char __user *, filename, int, mode)\n{", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif")

          # 4. kernel/reboot.c Hook Injections
          reboot_decls = "#ifdef CONFIG_KSU_MANUAL_HOOK\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif"
          inject_after("kernel/reboot.c", "* reboot doesn't sync: do that yourself before calling this.\n */", reboot_decls)

          inject_after("kernel/reboot.c", "\tchar buffer[256];\n\tint ret = 0;", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif")

          # 5. drivers/input/input.c Hook Injections
          input_decls = "#ifdef CONFIG_KSU_MANUAL_HOOK\nextern bool ksu_input_hook __read_mostly;\nextern __attribute__((cold)) int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);\n#endif"
          inject_after("drivers/input/input.c", "* axis, etc.\n */", input_decls)

          inject_after("drivers/input/input.c", "void input_event(struct input_dev *dev,\n\t\t unsigned int type, unsigned int code, int value)\n{", "#ifdef CONFIG_KSU_MANUAL_HOOK\n\tif (unlikely(ksu_input_hook))\n\t\tksu_handle_input_handle_event(&type, &code, &value);\n#endif")

          # 6. security/selinux Symbol Exposure
          def expose_selinux_symbol(file_path, target, replacement):
              p = Path(file_path)
              if p.exists():
                  p.chmod(0o644)
                  c = p.read_text(encoding='utf-8')
                  if target in c:
                      p.write_text(c.replace(target, replacement), encoding='utf-8')
                      print(f"Exposed symbol in {file_path}")

          expose_selinux_symbol("security/selinux/ss/services.c", "static DEFINE_RWLOCK(policy_rwlock);", "DEFINE_RWLOCK(policy_rwlock);")
          expose_selinux_symbol("security/selinux/hooks.c", "static struct security_operations selinux_ops = {", "struct security_operations selinux_ops = {")
          expose_selinux_symbol("security/selinux/selinuxfs.c", "static DEFINE_MUTEX(sel_mutex);", "DEFINE_MUTEX(sel_mutex);")

          PY

          echo "===== ReSukiSU FILE CHECK ====="
          find . -maxdepth 5 \( -iname "*resukisu*" -o -iname "*kernelsu*" -o -iname "*ksu*" \) | head -150

      - name: Build ReSukiSU kernel
        run: |
          set -e

          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="/usr/lib/llvm-14/bin:$PATH"

          make O=out_resukisu s5e5515-wise6blue_defconfig

          printf "" > .scmversion

          ./scripts/config --file out_resukisu/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out_resukisu/.config -d LOCALVERSION_AUTO || true

          # Ensure symbols are fully exposed for ReSukiSU's dynamic hook resolution engine
          ./scripts/config --file out_resukisu/.config -e KALLSYMS || true
          ./scripts/config --file out_resukisu/.config -e KALLSYMS_ALL || true

          # Enforce ReSukiSU Manual Hook engine configuration for Non-GKI hardware
          ./scripts/config --file out_resukisu/.config -e KSU_MANUAL_HOOK || true
          ./scripts/config --file out_resukisu/.config -e RESUKISU_MANUAL_HOOK || true

          ./scripts/config --file out_resukisu/.config -d MODULE_SIG_PROTECT || true
          ./scripts/config --file out_resukisu/.config -d UH || true
          ./scripts/config --file out_resukisu/.config -d RKP || true
          ./scripts/config --file out_resukisu/.config -d KDP || true
          ./scripts/config --file out_resukisu/.config -d SECURITY_DEFEX || true
          ./scripts/config --file out_resukisu/.config -d SVSMC || true
          ./scripts/config --file out_resukisu/.config -d SAMSUNG_PRODUCT_SHIP || true

          ./scripts/config --file out_resukisu/.config -e KSU || true
          ./scripts/config --file out_resukisu/.config -e KERNELSU || true
          ./scripts/config --file out_resukisu/.config -e RESUKISU || true

          make O=out_resukisu olddefconfig

          echo "===== SAMSUNG BLOCKER STRICT CHECK ====="
          grep -Ei "LOCALVERSION|KSU|KERNELSU|RESUKISU|MODULE_SIG_PROTECT|CONFIG_UH|CONFIG_RKP|CONFIG_KDP|CONFIG_SECURITY_DEFEX|CONFIG_SVSMC|CONFIG_SAMSUNG_PRODUCT_SHIP" out_resukisu/.config || true

          BAD=0
          for sym in \
            CONFIG_MODULE_SIG_PROTECT \
            CONFIG_UH \
            CONFIG_RKP \
            CONFIG_KDP \
            CONFIG_SECURITY_DEFEX \
            CONFIG_SVSMC \
            CONFIG_SAMSUNG_PRODUCT_SHIP
          do
            if grep -q "^${sym}=y" out_resukisu/.config; then
              echo "ERROR: $sym is still enabled"
              BAD=1
            fi
          done

          if [ "$BAD" = "1" ]; then
            echo "Samsung blocker config still enabled. Stop build."
            exit 1
          fi

          make O=out_resukisu -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp out_resukisu/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"
          cp out_resukisu/.config "$GITHUB_WORKSPACE/dist/resukisu.config"

          echo "===== BUILT KERNEL IMAGE ====="
          ls -lh "$GITHUB_WORKSPACE/dist/Image-ReSukiSU-R960"

      - name: Prepare stock firmware images
        run: |
          set -e

          mkdir -p work/firmware

          normalize_img() {
            name="$1"

            if [ -f "firmware/${name}.img" ]; then
              cp "firmware/${name}.img" "work/firmware/${name}.img"
              return 0
            fi

            if [ -f "firmware/${name}.img.lz4" ]; then
              lz4 -d -f "firmware/${name}.img.lz4" "work/firmware/${name}.img"
              return 0
            fi

            echo "Missing ${name}.img or ${name}.img.lz4"
            exit 1
          }

          normalize_img boot
          normalize_img init_boot
          normalize_img vbmeta

          echo "===== NORMALIZED FIRMWARE IMAGES ====="
          ls -lh work/firmware

      - name: Download avbtool
        run: |
          set -e

          echo "===== Download avbtool with retries/fallbacks ====="

          if [ -f "tools/avbtool.py" ]; then
            echo "Using repo-local tools/avbtool.py"
            cp tools/avbtool.py avbtool.py
          else
            mkdir -p tools

            python3 - <<'PY' ||
          import base64
          import time
          import urllib.request

          url = "https://android.googlesource.com/platform/external/avb/+/refs/heads/main/avbtool.py?format=TEXT"

          for attempt in range(1, 8):
              try:
                  print(f"Attempt {attempt}: {url}")
                  data = urllib.request.urlopen(url, timeout=60).read()
                  open("avbtool.py", "wb").write(base64.b64decode(data))
                  print("Downloaded avbtool.py from googlesource")
                  raise SystemExit(0)
              except Exception as e:
                  print("Failed:", e)
                  time.sleep(5)

          raise SystemExit(1)
          PY
          true

            if [ ! -s avbtool.py ]; then
              echo "Googlesource failed. Trying GitHub raw mirror..."
              curl -L --retry 10 --retry-all-errors --retry-delay 5 \
                -o avbtool.py \
                https://raw.githubusercontent.com/aosp-mirror/platform_external_avb/master/avbtool.py
            fi

            if [ ! -s avbtool.py ]; then
              echo "Raw mirror failed. Cloning GitHub mirror..."
              git clone --depth=1 https://github.com/aosp-mirror/platform_external_avb.git tools/platform_external_avb
              cp tools/platform_external_avb/avbtool.py avbtool.py
            fi
          fi

          chmod +x avbtool.py

          echo "===== avbtool check ====="
          python3 avbtool.py --help >/dev/null
          python3 avbtool.py --version || true
          echo "avbtool OK"

      - name: Repack boot.img with ReSukiSU Image
        run: |
          set -e

          cat > repack_boot_v4.py <<'PY'
          import struct
          from pathlib import Path

          PAGE = 4096
          SEANDROID = b"SEANDROIDENFORCE"

          stock_path = Path("work/firmware/boot.img")
          kernel_path = Path("dist/Image-ReSukiSU-R960")
          out_path = Path("work/firmware/boot_resukisu_noavb.img")

          stock = stock_path.read_bytes()
          kernel = kernel_path.read_bytes()

          if stock[:8] != b"ANDROID!":
              raise SystemExit("stock boot.img is not an Android boot image")

          old_kernel_size = struct.unpack("<I", stock[8:12])[0]
          ramdisk_size = struct.unpack("<I", stock[12:16])[0]
          os_version = struct.unpack("<I", stock[16:20])[0]
          header_size = struct.unpack("<I", stock[20:24])[0]
          header_version = struct.unpack("<I", stock[40:44])[0]
          cmdline = stock[44:44 + 1536]

          print("Old kernel size:", old_kernel_size)
          print("New kernel size:", len(kernel))
          print("Ramdisk size:", ramdisk_size)
          print("Header size:", header_size)
          print("Header version:", header_version)

          if header_version != 4:
              raise SystemExit(f"Expected boot header v4, got {header_version}")

          if ramdisk_size != 0:
              raise SystemExit(f"Expected ramdisk_size 0 for R960 boot.img, got {ramdisk_size}")

          def pad(data: bytes, page=PAGE) -> bytes:
              rem = len(data) % page
              if rem:
                  data += b"\x00" * (page - rem)
              return data

          hdr = bytearray()
          hdr += b"ANDROID!"
          hdr += struct.pack("<I", len(kernel))
          hdr += struct.pack("<I", 0)
          hdr += struct.pack("<I", os_version)
          hdr += struct.pack("<I", 1584)
          hdr += struct.pack("<4I", 0, 0, 0, 0)
          hdr += struct.pack("<I", 4)
          hdr += cmdline
          hdr += struct.pack("<I", 0)

          if len(hdr) != 1584:
              raise SystemExit(f"Bad header size: {len(hdr)}")

          img = bytes(hdr)
          img = pad(img)
          img += kernel
          img = pad(img)
          img += SEANDROID
          img = pad(img)

          if len(img) >= 50331648:
              raise SystemExit(f"New boot image too large: {len(img)}")

          out_path.write_bytes(img)
          print("Wrote:", out_path)
          print("Size:", out_path.stat().st_size)
          print("Room left:", 50331648 - out_path.stat().st_size)
          PY

          python3 repack_boot_v4.py

      - name: Generate local AVB key and re-footer boot/init_boot
        run: |
          set -e

          mkdir -p avb_keys

          openssl genrsa -out avb_keys/r960_local_avb.pem 4096

          cp work/firmware/boot_resukisu_noavb.img work/firmware/boot.img
          cp work/firmware/init_boot.img work/firmware/init_boot_refooter.img

          echo "===== Re-footer boot.img with local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/boot.img || true

          python3 avbtool.py add_hash_footer \
            --image work/firmware/boot.img \
            --partition_name boot \
            --partition_size 50331648 \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2

          echo "===== re-footer init_boot.img with same local AVB key rollback index 2 ====="
          python3 avbtool.py erase_footer --image work/firmware/init_boot_refooter.img || true

          python3 avbtool.py add_hash_footer \
            --image work/firmware/init_boot_refooter.img \
            --partition_name init_boot \
            --partition_size 16777216 \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2

          mv work/firmware/init_boot_refooter.img work/firmware/init_boot.img

          echo "===== boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/boot.img || true

          echo "===== init_boot AVB info ====="
          python3 avbtool.py info_image --image work/firmware/init_boot.img || true

      - name: Generate new top-level vbmeta.img
        run: |
          set -e

          python3 avbtool.py make_vbmeta_image \
            --output work/firmware/vbmeta.img \
            --algorithm SHA256_RSA4096 \
            --key avb_keys/r960_local_avb.pem \
            --rollback_index 2 \
            --flags 3 \
            --prop com.android.build.boot.os_version:16 \
            --prop com.android.build.boot.security_patch:2026-02-05 \
            --include_descriptors_from_image work/firmware/boot.img \
            --include_descriptors_from_image work/firmware/init_boot.img

          echo "===== New vbmeta info ====="
          python3 avbtool.py info_image --image work/firmware/vbmeta.img

      - name: Build plain POSIX Odin/NetOdin AP tar
        run: |
          set -e

          mkdir -p final_ap

          cp work/firmware/boot.img final_ap/boot.img
          cp work/firmware/init_boot.img final_ap/init_boot.img
          cp work/firmware/vbmeta.img final_ap/vbmeta.img

          tar --format=posix -cf dist/R960_ReSukiSU_AP.tar -C final_ap boot.img init_boot.img vbmeta.img

          cp dist/R960_ReSukiSU_AP.tar dist/R960_ReSukiSU_AP.tar.md5
          md5sum dist/R960_ReSukiSU_AP.tar >> dist/R960_ReSukiSU_AP.tar.md5

          sha256sum \
            dist/Image-ReSukiSU-R960 \
            dist/resukisu.config \
            dist/R960_ReSukiSU_AP.tar \
            dist/R960_ReSukiSU_AP.tar.md5 \
            > dist/SHA256SUMS.txt

          cat > dist/RELEASE_NOTES.txt <<'EOF'
          SM-R960 Galaxy Watch6 Classic ReSukiSU AP

          Target firmware:
          - R960XXU2CZB6
          - Android 16
          - Security patch 2026-02-05
          - Rollback index 2

          Package contents:
          - boot.img
          - init_boot.img
          - vbmeta.img

          Flash only after bootloader unlock.
          This AP tar is for SM-R960 R960XXU2CZB6 only.
          EOF

          echo "===== DIST FILES ====="
          ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: r960-resukisu-ap-${{ github.run_number }}
          name: SM-R960 ReSukiSU AP ${{ github.run_number }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/R960_ReSukiSU_AP.tar
            dist/R960_ReSukiSU_AP.tar.md5
            dist/Image-ReSukiSU-R960
            dist/resukisu.config
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.txt
